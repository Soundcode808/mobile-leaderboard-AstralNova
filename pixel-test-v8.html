// ── AudioContext 싱글톤 ─────────────────────────────
let _ctx = null;
function getCtx() {
  try {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  } catch(e) { return null; }
}
function beep(freq, dur, type='sine', vol=0.08, ctx=null) {
  try {
    const c = ctx || getCtx(); if (!c) return;
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(c.currentTime); o.stop(c.currentTime + dur + 0.01);
  } catch(e) {}
}
function sndWalk()  { beep(280+Math.random()*60, 0.04, 'square', 0.05); }
function sndJump()  {
  const c = getCtx(); if (!c) return;
  beep(330, 0.05, 'sine', 0.08, c);
  setTimeout(() => beep(660, 0.1, 'sine', 0.06, c), 60);
}
function sndLand()  { beep(160, 0.07, 'square', 0.07); }
function sndHappy(key) {
  const c = getCtx(); if (!c) return;

  (m[key]||m.nova).forEach(([f,t])=>{
    setTimeout(()=>beep(f,0.1,'sine',0.07,c),t*1000);
  });
}
function sndDimension() {
  const c = getCtx(); if (!c) return;
  try {
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g); g.connect(c.destination); o.type='sawtooth';
    o.frequency.setValueAtTime(80,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(440,c.currentTime+0.8);
    o.frequency.exponentialRampToValueAtTime(60,c.currentTime+1.6);
    g.gain.setValueAtTime(0.06,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+2);
    o.start(c.currentTime); o.stop(c.currentTime+2.1);
  } catch(e){}
}

function getGrid(shape) {
  if(shape==='normal') return {cols:8,rows:10};
  if(shape==='tall')   return {cols:6,rows:13};

  return {cols:8,rows:8};
}

// ── 픽셀 렌더러 ───────────────────────────────────
function PixelChar({ frame, cols, rows, size=6, flipX=false, glow='' }) {
  return (
    <div style={{
      display:'inline-grid',
      gridTemplateColumns:`repeat(${cols},${size}px)`,
      gridTemplateRows:`repeat(${rows},${size}px)`,
      transform: flipX?'scaleX(-1)':'none',
      imageRendering:'pixelated',
      filter: glow ? `drop-shadow(0 0 4px ${glow}80)` : undefined,
    }}>
      {frame.flat().map((color,i)=>(
        <div key={i} style={{ width:size, height:size, background:color||'transparent', borderRadius:color?1:0 }}/>
      ))}
    </div>
  );
}

// ── 스파클 ────────────────────────────────────────
function Sparkle({x,y,emoji,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,800);return()=>clearTimeout(t);},[]);
  return <div style={{position:'absolute',pointerEvents:'none',zIndex:20,left:x,top:y,fontSize:11,animation:'sparkleUp 0.8s ease-out forwards'}}>{emoji}</div>;
}

  dimensional:(n)=>`${n} 차원의 문을 통과하고 있습니다 🌀`,
};

const LOG_MSGS = {
  explore:    ['✦ 2구역 탐험 완료 +12 SP','✦ 새 구역 발견 +5 SP','✦ 유물 감지','✦ 탐험 기록 갱신'],
  mine:       ['⚡ 에너지 결정 ×3 획득','⚡ 희귀 광석 발견!','⚡ 채광 +8 SP','⚡ 자원 +15'],
  dimensional:['🌀 제3차원 통과 성공','🌀 아카샤 파편 수집 +20','🌀 차원 이동 기록','🌀 새 차원 루트 개척'],
  curious:    ['? 알 수 없는 신호 감지','? 에너지 이상 관측','? 무언가 가까이 있습니다'],
  bounce:     ['✨ 활력 회복!','✨ 에너지 +5'],
  nap:        ['💤 스태미나 완전 회복','💤 꿈속 기억 획득'],
};

// ── 스킬 데이터 ───────────────────────────────────
const SKILLS = [
  { icon:'🔭', name:'탐험', lv:1, desc:'미지의 구역을 탐색한다' },
  { icon:'⛏', name:'채집', lv:1, desc:'에너지 결정 채취 확률 +15%' },
  { icon:'🌀', name:'차원이동', lv:1, desc:'차원의 문을 열어 이동한다' },
];

// ── 차원맵 체인 (성역 → 차원A → 차원B → ...) ────────
const DIM_CHAIN = ['성역', '차원A', '차원B', '차원C', '차원D', '차원E'];

// ── BGM 트랙 (Documents/bgm/ 폴더) ──────────────────
const BGM_BASE = 'bgm/';
const BGM_TRACKS = [
  {name:'DEFAULT', url:BGM_BASE+'BGM.mp3'},
  {name:'BGM 1',   url:BGM_BASE+'BGM1.mp3'},
  {name:'BGM 2',   url:BGM_BASE+'BGM2.mp3'},
  {name:'BGM 3',   url:BGM_BASE+'BGM3.mp3'},
  {name:'BGM 4',   url:BGM_BASE+'BGM4.mp3'},
  {name:'BGM 5',   url:BGM_BASE+'BGM5.mp3'},
  {name:'BGM 6',   url:BGM_BASE+'BGM6.mp3'},
  {name:'BGM 7',   url:BGM_BASE+'BGM7.mp3'},
  {name:'BGM 8',   url:BGM_BASE+'BGM8.mp3'},
  {name:'BGM 9',   url:BGM_BASE+'BGM9.mp3'},
  {name:'BGM 10',  url:BGM_BASE+'BGM10.mp3'},
  {name:'BGM 11',  url:BGM_BASE+'BGM11.mp3'},
  {name:'BGM 12',  url:BGM_BASE+'BGM12.mp3'},
  {name:'BGM 13',  url:BGM_BASE+'BGM13.mp3'},
];

// ── 메인 ─────────────────────────────────────────
function App() {
  const [vKey, setVKey]           = useState('nova');
  const [frame, setFrame]         = useState('idle');
  const [posX, setPosX]           = useState(130);
  const [posY, setPosY]           = useState(0);
  const [floatY, setFloatY]       = useState(0);
  const [flipX, setFlipX]         = useState(false);
  const [aiState, setAiState]     = useState('idle');
  const [sparkles, setSparkles]   = useState([]);
  const [showZzz, setShowZzz]     = useState(false);
  const [dark, setDark]           = useState(true);
  const [manual, setManual]       = useState(false);
  const [thought, setThought]     = useState('');
  const [actLog, setActLog]       = useState([]);
  const [dimMode, setDimMode]     = useState(false);
  const [dimPhase, setDimPhase]   = useState(0);
  const [scale, setScale]         = useState(1);
  const [soundOn, setSoundOn]     = useState(false);
  const [activeTab, setActiveTab] = useState('skill'); // 'skill' | 'map' | 'settings'
  // ── BGM / SFX 볼륨 ──────────────────────────────
  const [mp3Idx, setMp3Idx]         = useState(0);
  const [mp3Playing, setMp3Playing] = useState(false);
  const [mp3Loop, setMp3Loop]       = useState('all'); // 'none'|'one'|'all'
  const [mp3Shuffle, setMp3Shuffle] = useState(false);
  const [mp3Vol, setMp3Vol]         = useState(0.7);
  const [sfxVol, setSfxVol]         = useState(0.7);
  const audioRef = useRef(null);

  // 차원맵 상태
  const [chainIdx, setChainIdx]     = useState(0);     // DIM_CHAIN 현재 인덱스
  const [travelProg, setTravelProg] = useState(0);     // 0~100 마커 진행도
  const [traveling, setTraveling]   = useState(false);
  const travelRef  = useRef(null);
  const travelTmrRef = useRef(null);

  const posXRef  = useRef(130);
  const targetX  = useRef(130);
  const aiTimer  = useRef(null);
  const jumpTimer= useRef(null);
  const floatRef = useRef(null);
  const walkTmr  = useRef(null);
  const blinkTmr = useRef(null);
  const walkIv   = useRef(null);
  const pinchDist= useRef(null);
  const pinchScale=useRef(1);

  const V      = VARIANTS[vKey];
  const FRAMES = buildFrames(V);
  const {cols,rows} = getGrid(V.shape);
  const PX = 6;

  const C = dark
    ? {bg:'#08051A',stage:'#110D28',ground:'#1C1535',txt:'#EEE8FF',sub:'#7C5CFC18',border:'#7C5CFC30',logBg:'#0E0B22',logBorder:'#7C5CFC25',panel:'#0E0B22',panelBorder:'#7C5CFC25'}
    : {bg:'#F0EEFF',stage:'#E8E2FF',ground:'#D0C8FF',txt:'#1A0F3C',sub:'#7C5CFC12',border:'#7C5CFC22',logBg:'#F8F5FF',logBorder:'#7C5CFC20',panel:'#F8F5FF',panelBorder:'#7C5CFC20'};

  const activateSound = useCallback(() => {
    if (soundOn) return;
    getCtx(); setSoundOn(true);
  }, [soundOn]);

  // 부유
  useEffect(() => {
    let t = 0;
    const tick = () => { t += 0.065; setFloatY(Math.sin(t) * 3.5); floatRef.current = requestAnimationFrame(tick); };
    floatRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(floatRef.current);
  }, []);

  // 깜빡임
  useEffect(() => {
    const sch = () => {
      blinkTmr.current = setTimeout(() => {
        if (frame==='idle'||frame==='curious') {
          setFrame('blink');
          setTimeout(()=>setFrame(f=>f==='blink'?'idle':f), 150);
        }
        sch();
      }, 2000 + Math.random()*3500);
    };
    sch();
    return ()=>clearTimeout(blinkTmr.current);
  }, [frame]);

  // BGM 볼륨 동기화
  useEffect(()=>{
    if(audioRef.current) audioRef.current.volume = mp3Vol;
  },[mp3Vol]);

  // 트랙 변경 시 자동 로드
  useEffect(()=>{
    if(!audioRef.current) return;
    audioRef.current.load();
    if(mp3Playing) audioRef.current.play().catch(()=>{});
  },[mp3Idx]);

  // 로그
  const addLog = useCallback((state) => {
    const pool = LOG_MSGS[state];
    if (!pool) return;
    const msg = pool[Math.floor(Math.random()*pool.length)];
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setActLog(l => [{time, msg, id:Date.now()}, ...l].slice(0, 6));
  }, []);

  // 차원이동 감지 → 마커 이동 (dimPhase=1 타이밍 600ms에 맞춤)
  useEffect(() => {
    if (aiState === 'dimensional') {
      setTraveling(true);
      setTravelProg(0);
      clearInterval(travelRef.current);
      clearTimeout(travelTmrRef.current);
      // 캐릭터 포탈 링 등장(600ms)과 타이밍 맞춰 마커 출발
      travelTmrRef.current = setTimeout(() => {
        let prog = 0;
        // 600ms 지연 후 2200ms 동안 이동 → dimPhase=3(3000ms) 즈음 도착
        travelRef.current = setInterval(() => {
          prog += 2.3; // ~100/43스텝 ≈ 2150ms
          if (prog >= 100) {
            prog = 100;
            clearInterval(travelRef.current);
            setTravelProg(100);
            setTraveling(false);
            setChainIdx(i => i + 1);
            // 도착 후 잠시 머물다가 다음 여정 대기 상태로 리셋
            setTimeout(() => setTravelProg(0), 1200);
          } else {
            setTravelProg(prog);
          }
        }, 50);
      }, 600);
    }
    return () => {
      clearTimeout(travelTmrRef.current);
      clearInterval(travelRef.current);
    };
  }, [aiState]);

  // AI 루프
  const runAI = useCallback((st, vk) => {
    if (manual) return;
    clearTimeout(aiTimer.current); clearInterval(walkIv.current);
    const def = AI_DEF[st] || AI_DEF.idle;
    const dur = def.min + Math.random()*(def.max-def.min);
    setAiState(st);

    if (st==='idle') { setFrame('idle'); setShowZzz(false); setDimMode(false); }
    if (st==='wander') {
      const stageW = 260;
      targetX.current = 20 + Math.random()*(stageW-40);
      const dir = targetX.current > posXRef.current ? 'right':'left';
      setFlipX(dir==='left'); setFrame('walk');
      walkIv.current = setInterval(()=>{
        setPosX(x=>{
          const dx = dir==='right'?5:-5;
          const nx = Math.max(20,Math.min(260,x+dx));
          posXRef.current = nx;
          if(Math.abs(nx-targetX.current)<7){ clearInterval(walkIv.current); setFrame('idle'); }
          return nx;
        });
        if(soundOn && Math.random()<0.2) sndWalk();
      },160);
    }
    if (st==='curious') {
      setFrame('curious');
      setTimeout(()=>setFlipX(f=>!f),350);
      setTimeout(()=>setFlipX(f=>!f),700);
      const thoughtList = {
        nova:['✦ 별의 파동...','세계가 흔들려','무언가 가까이','...'],
        ignis:['🔥 불꽃이 커져','이상한 열기','달려야겠어!','...'],
        aqua:['💧 물결이...','흐름이 끊겼어','뭔가 이상해','...'],
        lux:['⭐ 빛이 보여','반짝임이...','따뜻해','...✨'],
      };
      const tList = thoughtList[vk]||thoughtList.nova;
      setThought(tList[Math.floor(Math.random()*tList.length)]);
      setTimeout(()=>setThought(''),2200);
      addLog('curious');
    }
    if (st==='nap') {
      setFrame('nap'); setShowZzz(true); setDimMode(false);
      if(soundOn) sndNap();
      addLog('nap');
    }
    if (st==='bounce') {
      setFrame('idle');
      if(soundOn) sndJump();
      setPosY(-45); setTimeout(()=>setPosY(-25),170); setTimeout(()=>setPosY(-8),340); setTimeout(()=>{ setPosY(0); if(soundOn) sndLand(); },500);
      addLog('bounce');
    }
    if (st==='explore') {
      setFrame('walk');
      let dir = Math.random()>0.5?'right':'left';
      setFlipX(dir==='left');
      walkIv.current = setInterval(()=>{
        setPosX(x=>{
          const nx = Math.max(20,Math.min(260,x+(dir==='right'?4:-4)));
          posXRef.current=nx;
          if(nx<=20||nx>=260){ dir=dir==='right'?'left':'right'; setFlipX(dir==='left'); }
          return nx;
        });
        if(soundOn&&Math.random()<0.1) sndWalk();
        if(Math.random()<0.08){
          setSparkles(s=>[...s,{id:Date.now()+Math.random(),x:posXRef.current-15+Math.random()*40,y:20+Math.random()*80,emoji:V.sparks[Math.floor(Math.random()*V.sparks.length)]}]);
        }
      },200);
      addLog('explore');
    }
    if (st==='mine') {
      setFrame('mine'); setDimMode(false);
      let mc=0;
      walkIv.current = setInterval(()=>{
        mc++;
        setPosX(x=>{ posXRef.current=x+(mc%2===0?2:-2); return posXRef.current; });
        if(soundOn&&mc%4===0) sndMine();
      },120);
      addLog('mine');
    }
    if (st==='dimensional') {
      setFrame('dim'); setDimMode(true); setShowZzz(false);
      if(soundOn) sndDimension();
      const dimEmojis=['🌀','✦','💫','⚡','🔮'];
      Array.from({length:12},(_,i)=>{
        setTimeout(()=>{
          setSparkles(s=>[...s,{id:Date.now()+i,x:posXRef.current-40+Math.random()*90,y:10+Math.random()*120,emoji:dimEmojis[i%dimEmojis.length]}]);
        },i*200);
      });
      setDimPhase(0);
      setTimeout(()=>setDimPhase(1),600);
      setTimeout(()=>setDimPhase(2),1500);
      setTimeout(()=>setDimPhase(3),3000);
      addLog('dimensional');
    }

    aiTimer.current = setTimeout(()=>{
      if(st==='nap'){ setShowZzz(false); if(soundOn){ beep(440,.1); setTimeout(()=>beep(660,.1),120); } }
      if(st==='dimensional'){ setDimMode(false); setDimPhase(0); }
      clearInterval(walkIv.current);
      const nxt=def.next[Math.floor(Math.random()*def.next.length)];
      runAI(nxt, vk);
    }, dur);
  }, [manual, soundOn, addLog, V]);

  useEffect(()=>{
    if(!manual) runAI('idle', vKey);
    return()=>{ clearTimeout(aiTimer.current); clearInterval(walkIv.current); };
  }, [vKey, manual]);

  const doJump = useCallback(()=>{
    activateSound();
    setManual(true); clearTimeout(aiTimer.current); clearInterval(walkIv.current);
    setShowZzz(false); setDimMode(false);
    if(posY!==0) return;
    if(soundOn) sndJump(); setFrame('idle');
    let t=0;
    const go=()=>{
      t+=0.17;
      const y=-Math.sin(t*Math.PI/2.0)*70;
      setPosY(y>0?0:y);
      if(t<2.0){ jumpTimer.current=setTimeout(go,28); }
      else{ setPosY(0); if(soundOn) sndLand(); setManual(false); setTimeout(()=>runAI('idle',vKey),100); }
    };
    go();
  },[posY,soundOn,vKey,runAI,activateSound]);

  const doHappy = useCallback(()=>{
    activateSound();
    setManual(true); clearTimeout(aiTimer.current); clearInterval(walkIv.current);
    setShowZzz(false); setDimMode(false);
    setFrame('happy'); if(soundOn) sndHappy(vKey);
    Array.from({length:7},(_,i)=>setTimeout(()=>{
      setSparkles(s=>[...s,{id:Date.now()+i,x:posXRef.current-30+Math.random()*80,y:20+Math.random()*80,emoji:V.sparks[i%V.sparks.length]}]);
    },i*70));
    setTimeout(()=>{ setFrame('idle'); setManual(false); setTimeout(()=>runAI('idle',vKey),100); },1400);
  },[soundOn,vKey,V,runAI,activateSound]);

  const doWalk = useCallback((dir)=>{
    activateSound();
    setManual(true); clearTimeout(aiTimer.current); clearInterval(walkIv.current);
    setDimMode(false); setFlipX(dir==='left'); setFrame('walk');
    const tick=()=>{ setPosX(x=>{ const nx=Math.max(20,Math.min(260,x+(dir==='right'?8:-8))); posXRef.current=nx; return nx; }); if(soundOn&&Math.random()<0.3) sndWalk(); walkTmr.current=setTimeout(tick,130); };
    tick();
  },[soundOn,activateSound]);

  const stopWalk = useCallback(()=>{
    clearTimeout(walkTmr.current); setFrame('idle'); setManual(false);
    setTimeout(()=>runAI('idle',vKey),150);
  },[vKey,runAI]);

  const switchV = (k)=>{
    activateSound();
    clearTimeout(aiTimer.current); clearInterval(walkIv.current); clearTimeout(walkTmr.current);
    setVKey(k); setFrame('idle'); setAiState('idle'); setManual(false);
    setShowZzz(false); setDimMode(false); setThought(''); sndSelect();
    setTimeout(()=>{
      const V2=VARIANTS[k];
      setSparkles(Array.from({length:5},(_,i)=>({id:Date.now()+i,x:posXRef.current-20+Math.random()*70,y:30+Math.random()*60,emoji:V2.sparks[i%V2.sparks.length]})));
    },50);
  };

  const onTouchStart = (e)=>{
    activateSound();
    if(e.touches.length===2){
      pinchDist.current=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pinchScale.current=scale;
    }
  };
  const onTouchMove = (e)=>{
    if(e.touches.length===2&&pinchDist.current){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ns=Math.max(0.5,Math.min(2.5,pinchScale.current*(d/pinchDist.current)));
      setScale(ns);
    }
  };
  const onTouchEnd=()=>{ pinchDist.current=null; };

  useEffect(()=>{
    const ks=new Set();
    const dn=(e)=>{ if(ks.has(e.key))return; ks.add(e.key);
      if(e.key==='ArrowRight'||e.key==='d') doWalk('right');
      if(e.key==='ArrowLeft' ||e.key==='a') doWalk('left');
      if(e.key===' '||e.key==='ArrowUp'||e.key==='w') doJump();
      if(e.key==='h'||e.key==='f') doHappy();
    };
    const up=(e)=>{ ks.delete(e.key); if(['ArrowRight','ArrowLeft','d','a'].includes(e.key)) stopWalk(); };
    window.addEventListener('keydown',dn); window.addEventListener('keyup',up);
    return()=>{ window.removeEventListener('keydown',dn); window.removeEventListener('keyup',up); };
  },[doWalk,stopWalk,doJump,doHappy]);

  const botOff = V.shape==='chubby'?52:V.shape==='round'?54:50;
  const isDim  = aiState==='dimensional' && !manual;
  const dimFilter = isDim ? [
    'none',
    'hue-rotate(60deg) brightness(1.2)',
    'hue-rotate(150deg) brightness(0.8) saturate(2)',
    'hue-rotate(280deg) brightness(1.4) saturate(3)',
  ][dimPhase] : 'none';

  // 마커 위치 계산 (% → px, 레일 길이 약 260px)
  const markerPct = travelProg; // 0 ~ 100

  return (
    <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      style={{ background:C.bg, minHeight:'100vh', maxWidth:390, margin:'0 auto',
        fontFamily:'"Nunito",sans-serif', display:'flex', flexDirection:'column',
        alignItems:'center', userSelect:'none', overflow:'hidden', touchAction:'none' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
        @keyframes sparkleUp{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}100%{opacity:0;transform:translateY(-45px) scale(1.6) rotate(25deg)}}
        @keyframes zzzFloat{0%{opacity:0;transform:translateY(0) scale(.8)}30%{opacity:.9}100%{opacity:0;transform:translateY(-24px) scale(1.1)}}
        @keyframes thoughtPop{0%{opacity:0;transform:scale(.7) translateY(4px)}20%{opacity:1;transform:scale(1) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-5px)}}
        @keyframes glowPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.12)}}
        @keyframes portalRing{0%{transform:scale(.3);opacity:.9}100%{transform:scale(3);opacity:0}}
        @keyframes dimScroll{0%{background-position:0 0}100%{background-position:60px 60px}}
        @keyframes logIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes markerPulse{0%,100%{box-shadow:0 0 0 2px #9B7FFF60}50%{box-shadow:0 0 0 4px #9B7FFF90,0 0 8px #9B7FFF60}}
        @keyframes nodePulse{0%,100%{opacity:.7}50%{opacity:1}}
      `}</style>

      {/* 로고 헤더 */}
      <div style={{width:'100%',padding:'12px 18px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:22,height:22,borderRadius:6,background:`linear-gradient(135deg,${V.aura},${V.aura2})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,boxShadow:`0 0 8px ${V.aura}60`}}>✦</div>
          <div>
            <div style={{fontSize:11,fontWeight:900,color:C.txt,letterSpacing:1,lineHeight:1}}>ASTRAL NOVA</div>
            <div style={{fontSize:8,color:V.aura,fontFamily:'"JetBrains Mono"',letterSpacing:2,opacity:.8}}>ANIMA COMPANION</div>
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button onClick={()=>{ getCtx(); setSoundOn(s=>!s); }} style={{background:soundOn?`${V.aura}30`:C.sub,border:`1.5px solid ${V.aura}40`,borderRadius:50,padding:'4px 10px',fontSize:11,cursor:'pointer',color:soundOn?V.aura:C.txt,fontWeight:800}}>{soundOn?'🔊':'🔇'}</button>
          <button onClick={()=>setDark(d=>!d)} style={{background:dark?`linear-gradient(135deg,${V.aura},${V.aura2})`:C.sub,border:'none',borderRadius:50,padding:'4px 10px',fontSize:12,cursor:'pointer'}}>{dark?'☀️':'🌙'}</button>
        </div>
      </div>

      {/* 변종 탭 */}
      <div style={{display:'flex',gap:5,padding:'0 18px 6px',width:'100%'}}>
        {Object.entries(VARIANTS).map(([k,v])=>(
          <button key={k} onClick={()=>switchV(k)} style={{flex:1,border:vKey===k?`1.5px solid ${v.aura}`:`1.5px solid ${v.aura}28`,borderRadius:10,padding:'5px 2px',background:vKey===k?`linear-gradient(135deg,${v.aura}22,${v.aura2}10)`:(dark?'#ffffff06':'#ffffff50'),cursor:'pointer',boxShadow:vKey===k?`0 0 10px ${v.aura}30`:'none',transition:'all 0.15s cubic-bezier(0.34,1.56,0.64,1)',transform:vKey===k?'scale(1.04)':'scale(1)'}}>
            <div style={{fontSize:13}}>{v.icon}</div>
            <div style={{fontSize:8,fontWeight:900,color:vKey===k?v.aura:C.txt,fontFamily:'"JetBrains Mono"',letterSpacing:.5}}>{v.name}</div>
          </button>
        ))}
      </div>

      {/* 스테이지 */}
      <div style={{width:340,height:200,position:'relative',background:isDim?`linear-gradient(135deg,#0A0518,#1A0838,#0D1544)`:`linear-gradient(180deg,${C.stage} 0%,${C.stage}bb 100%)`,borderRadius:16,border:isDim?`1.5px solid ${V.aura}80`:`1.5px solid ${V.aura}22`,overflow:'hidden',margin:'0 18px',boxShadow:isDim?`0 0 30px ${V.aura}50, 0 0 60px ${V.aura}20, inset 0 0 40px ${V.aura}15`:`0 4px 20px ${V.aura}12`,transition:'filter 0.5s, box-shadow 0.5s',filter:dimFilter}}>
        {isDim && <div style={{position:'absolute',inset:0,backgroundImage:`radial-gradient(circle,${V.aura}20 1px,transparent 1px)`,backgroundSize:'20px 20px',animation:'dimScroll 1s linear infinite',opacity:dimPhase>=2?0.8:0.4}}/>}
        {isDim && dimPhase>=1 && (<><div style={{position:'absolute',left:posXRef.current-30,top:'30%',width:60,height:60,borderRadius:'50%',border:`2px solid ${V.aura}`,animation:'portalRing 1.2s ease-out infinite'}}/><div style={{position:'absolute',left:posXRef.current-20,top:'35%',width:40,height:40,borderRadius:'50%',border:`1.5px solid ${V.aura2}`,animation:'portalRing 1.2s ease-out 0.4s infinite'}}/></>)}
        {(dark||isDim) && Array.from({length:10},(_,i)=>(<div key={i} style={{position:'absolute',left:[15,50,90,130,170,210,250,290,35,200][i],top:[10,25,8,18,30,8,22,14,40,35][i],width:2,height:2,borderRadius:'50%',background:V.aura,opacity:.25+((i%3)*.1)}}/>))}
        {!isDim && [[25,35,44],[115,26,32],[210,38,36],[285,30,26]].map(([x,h,w],i)=>(<div key={i} style={{position:'absolute',bottom:48,left:x-w/2,width:w,height:h,background:`${V.aura}14`,borderRadius:`${w/2}px ${w/2}px 0 0`}}/>))}
        {sparkles.map(sp=>(<Sparkle key={sp.id} x={sp.x} y={sp.y} emoji={sp.emoji} onDone={()=>setSparkles(s=>s.filter(x=>x.id!==sp.id))}/>))}
        {showZzz && <div style={{position:'absolute',left:posXRef.current+8,top:20,fontSize:10,color:'#aaa',animation:'zzzFloat 2s ease-out infinite'}}>💤</div>}
        {thought && <div style={{position:'absolute',zIndex:15,left:Math.min(posXRef.current-25,220),top:12,background:dark?'#1C1535ee':'#ffffffee',border:`1.5px solid ${V.aura}50`,borderRadius:10,padding:'4px 9px',fontSize:10,fontWeight:800,color:V.aura,whiteSpace:'nowrap',animation:'thoughtPop 2.2s ease forwards',boxShadow:`0 2px 8px ${V.aura}25`}}>{thought}</div>}
        <div style={{position:'absolute',left:posXRef.current-14,bottom:botOff+(-posY)+floatY+rows*PX*.15,width:28,height:28,borderRadius:'50%',background:`radial-gradient(circle,${V.aura}50 0%,transparent 70%)`,animation:'glowPulse 2s ease-in-out infinite',transition:'left .06s,bottom .04s',pointerEvents:'none'}}/>
        <div style={{position:'absolute',left:posXRef.current,bottom:botOff+(-posY)+floatY,transform:`translateX(-50%) scale(${scale})`,transition:frame==='walk'?'none':'bottom 0.04s linear',imageRendering:'pixelated',filter:`drop-shadow(0 0 5px ${V.aura}70)`}}>
          <PixelChar frame={FRAMES[frame]||FRAMES.idle} cols={cols} rows={rows} size={PX} flipX={flipX} glow={V.aura}/>
        </div>
        <div style={{position:'absolute',bottom:46,left:posXRef.current-12,width:24,height:6,background:`${V.aura}25`,borderRadius:'50%',transition:'left .06s',transform:`scaleY(${posY<-20?.3:1}) scaleX(${posY<-20?.5:1})`,opacity:posY<-20?.3:.65,filter:'blur(2px)'}}/>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:50,background:`linear-gradient(180deg,${C.ground} 0%,${C.ground}cc 100%)`,borderTop:`2px solid ${V.aura}${isDim?'60':'30'}`}}>
          {Array.from({length:22},(_,i)=>(<div key={i} style={{position:'absolute',top:0,left:i*16,width:15,height:3,background:i%2===0?`${V.aura}${isDim?'45':'25'}`:'transparent'}}/>))}
        </div>
      </div>

      {/* AI 상태 바 */}
      <div style={{width:'100%',padding:'6px 18px 0',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${V.aura},${V.aura2})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,boxShadow:`0 0 8px ${V.aura}50`,flexShrink:0}}>{V.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:900,color:C.txt,lineHeight:1.2}}>{AI_MSG[aiState]?AI_MSG[aiState](V.name):`${V.name} 대기 중`}</div>
          <div style={{fontSize:9,color:V.aura,fontFamily:'"JetBrains Mono"',opacity:.7,letterSpacing:.5,marginTop:1}}>{manual?'· 수동 조작':isDim?'· 차원 이동 중...':'· AI 자율 활동'}</div>
        </div>
        <div style={{fontSize:9,color:V.aura,fontFamily:'"JetBrains Mono"',opacity:.5}}>{Math.round(scale*100)}%</div>
      </div>

      {/* 활동 로그 */}
      <div style={{width:'calc(100% - 36px)',margin:'6px 18px 0',background:C.logBg,borderRadius:12,border:`1px solid ${C.logBorder}`,padding:'8px 10px',minHeight:52}}>
        <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,marginBottom:4}}>ACTIVITY LOG</div>
        {actLog.length===0 ? (
          <div style={{fontSize:10,color:C.txt,opacity:.35,fontStyle:'italic'}}>아직 활동 기록이 없습니다...</div>
        ) : actLog.map((l,i)=>(
          <div key={l.id} style={{display:'flex',gap:6,alignItems:'center',marginBottom:2,animation:'logIn .3s ease',opacity:1-i*.12}}>
            <span style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,opacity:.6,flexShrink:0}}>{l.time}</span>
            <span style={{fontSize:10,color:C.txt,fontWeight:700}}>{l.msg}</span>
          </div>
        ))}
      </div>

      {/* 컨트롤 */}
      <div style={{width:'100%',padding:'6px 18px 0',display:'flex',flexDirection:'column',gap:6}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
          {[{label:'← 이동',onD:()=>doWalk('left'),onU:stopWalk},{label:'↑ 점프',onD:doJump,onU:undefined},{label:'이동 →',onD:()=>doWalk('right'),onU:stopWalk}].map(({label,onD,onU})=>(
            <button key={label} onPointerDown={onD} onPointerUp={onU} onPointerLeave={onU} style={{background:`linear-gradient(135deg,${V.aura},${V.aura}bb)`,border:'none',borderRadius:10,padding:'9px 0',color:'#fff',fontSize:11,fontWeight:800,cursor:'pointer',boxShadow:`0 2px 8px ${V.aura}30`,fontFamily:'"Nunito"'}}>{label}</button>
          ))}
        </div>
        <button onPointerDown={doHappy} style={{background:`linear-gradient(135deg,${V.aura2},${V.aura})`,border:'none',borderRadius:10,padding:'10px 0',color:'#fff',fontSize:12,fontWeight:900,cursor:'pointer',boxShadow:`0 2px 10px ${V.aura}40`,fontFamily:'"Nunito"'}}>
          {V.sparks[0]} 해피 댄스!
        </button>
      </div>

      {/* hidden audio — 탭과 무관하게 항상 마운트 */}
      <audio ref={audioRef}
        src={BGM_TRACKS[mp3Idx].url}
        loop={mp3Loop==='one'}
        onEnded={()=>{
          const next = mp3Shuffle
            ? Math.floor(Math.random()*BGM_TRACKS.length)
            : (mp3Idx+1)%BGM_TRACKS.length;
          setMp3Idx(next);
          setTimeout(()=>{ if(audioRef.current){ audioRef.current.load(); audioRef.current.play().catch(()=>{}); setMp3Playing(true); }},50);
        }}
        style={{display:'none'}}
      />

      {/* 하단 탭 네비게이션 */}
      <div style={{width:'calc(100% - 36px)',margin:'8px 18px 0',display:'flex',gap:0,borderRadius:12,overflow:'hidden',border:`1px solid ${C.border}`}}>
        {[{id:'skill',label:'스킬',icon:'⚔️'},{id:'map',label:'차원맵',icon:'🗺️'},{id:'settings',label:'설정',icon:'⚙️'}].map((tab,i)=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{flex:1,padding:'8px 4px',background:activeTab===tab.id?`linear-gradient(135deg,${V.aura}30,${V.aura2}18)`:(dark?'#ffffff06':'#ffffff40'),border:'none',borderRight:i<2?`1px solid ${C.border}`:'none',cursor:'pointer',transition:'background .15s'}}>
            <div style={{fontSize:12}}>{tab.icon}</div>
            <div style={{fontSize:9,fontWeight:900,color:activeTab===tab.id?V.aura:C.txt,fontFamily:'"JetBrains Mono"',letterSpacing:.5,marginTop:1}}>{tab.label}</div>
          </button>
        ))}
      </div>

      {/* 탭 패널 */}
      <div style={{width:'calc(100% - 36px)',margin:'0 18px 12px',background:C.panel,borderRadius:'0 0 12px 12px',border:`1px solid ${C.border}`,borderTop:'none',padding:'10px 12px',minHeight:90}}>

        {/* ── 스킬 탭 ─────────────────────── */}
        {activeTab==='skill' && (
          <div>
            <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,marginBottom:8}}>SKILLS</div>
            {SKILLS.map((sk,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 8px',borderRadius:8,background:dark?'#ffffff06':'#ffffff40',marginBottom:5,border:`1px solid ${V.aura}15`}}>
                <div style={{fontSize:18}}>{sk.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:11,fontWeight:900,color:C.txt}}>{sk.name}</span>
                    <span style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,background:`${V.aura}20`,borderRadius:4,padding:'1px 5px'}}>Lv.{sk.lv}</span>
                  </div>
                  <div style={{fontSize:9,color:C.txt,opacity:.55,marginTop:1}}>{sk.desc}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── 차원맵 탭 ───────────────────── */}
        {activeTab==='map' && (()=>{
          const fromLabel = DIM_CHAIN[chainIdx % DIM_CHAIN.length];
          const toLabel   = DIM_CHAIN[(chainIdx + 1) % DIM_CHAIN.length];
          const atFrom    = !traveling && travelProg < 50;
          const atTo      = !traveling && travelProg >= 50;
          return (
          <div>
            <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,marginBottom:10}}>DIMENSION MAP</div>

            {/* 현재 위치 */}
            <div style={{textAlign:'center',marginBottom:10}}>
              <span style={{fontSize:9,fontFamily:'"JetBrains Mono"',color:V.aura,opacity:.6}}>현재 위치: </span>
              <span style={{fontSize:11,fontWeight:900,color:V.aura}}>
                {traveling ? '🌀 이동 중...' : atTo ? toLabel : fromLabel}
              </span>
            </div>

            {/* 맵 레일 */}
            <div style={{position:'relative',padding:'0 20px',marginBottom:6}}>
              <div style={{height:3,background:`${V.aura}20`,borderRadius:2,position:'relative',margin:'20px 0'}}>

                {/* 진행 라인 */}
                <div style={{position:'absolute',left:0,top:0,height:'100%',borderRadius:2,background:`linear-gradient(90deg,${V.aura},${V.aura2})`,width:`${markerPct}%`,transition:'width 0.05s linear',opacity:.8}}/>

                {/* 이동 마커 */}
                <div style={{
                  position:'absolute',
                  left:`${markerPct}%`,
                  top:'50%',
                  transform:'translate(-50%,-50%)',
                  width:14,height:14,
                  borderRadius:'50%',
                  background:`linear-gradient(135deg,${V.aura},${V.aura2})`,
                  boxShadow:traveling?`0 0 10px ${V.aura}, 0 0 20px ${V.aura}60`:`0 0 5px ${V.aura}80`,
                  transition:'left 0.05s linear, box-shadow 0.3s',
                  animation:'markerPulse 1.5s ease-in-out infinite',
                  zIndex:4,
                }}>
                  <div style={{position:'absolute',inset:3,borderRadius:'50%',background:'#fff',opacity:.6}}/>
                </div>

                {/* 출발 노드 (왼쪽) */}
                <div style={{position:'absolute',left:0,top:'50%',transform:'translate(-50%,-50%)',zIndex:3}}>
                  <div style={{
                    width:18,height:18,borderRadius:'50%',
                    background: atFrom ? `linear-gradient(135deg,${V.aura},${V.aura2})` : 'transparent',
                    border:`2px solid ${V.aura}`,
                    boxShadow: atFrom ? `0 0 10px ${V.aura}90` : 'none',
                    animation:'nodePulse 2s ease-in-out infinite',
                    transition:'all 0.4s',
                  }}/>
                </div>

                {/* 도착 노드 (오른쪽) */}
                <div style={{position:'absolute',right:0,top:'50%',transform:'translate(50%,-50%)',zIndex:3}}>
                  <div style={{
                    width:18,height:18,borderRadius:'50%',
                    background: atTo ? `linear-gradient(135deg,${V.aura},${V.aura2})` : 'transparent',
                    border:`2px solid ${V.aura}55`,
                    boxShadow: atTo ? `0 0 10px ${V.aura}90` : 'none',
                    animation:'nodePulse 2s ease-in-out 1s infinite',
                    transition:'all 0.4s',
                  }}/>
                </div>
              </div>

              {/* 노드 라벨 */}
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <div style={{textAlign:'center',width:54}}>
                  <div style={{fontSize:10,fontWeight:900,color:atFrom?V.aura:C.txt,opacity:atFrom?1:.5,transition:'all 0.4s'}}>{fromLabel}</div>
                  <div style={{fontSize:7,color:V.aura,fontFamily:'"JetBrains Mono"',opacity:.4}}>FROM</div>
                </div>
                <div style={{textAlign:'center',width:54}}>
                  <div style={{fontSize:10,fontWeight:900,color:atTo?V.aura:C.txt,opacity:atTo?1:.5,transition:'all 0.4s'}}>{toLabel}</div>
                  <div style={{fontSize:7,color:V.aura,fontFamily:'"JetBrains Mono"',opacity:.4}}>TO</div>
                </div>
              </div>
            </div>

            {/* 상태 안내 */}
            <div style={{textAlign:'center',marginTop:6}}>
              {traveling
                ? <span style={{fontSize:9,color:V.aura,fontFamily:'"JetBrains Mono"',opacity:.9}}>🌀 {fromLabel} → {toLabel} 이동 중...</span>
                : <span style={{fontSize:8,color:C.txt,opacity:.3,fontFamily:'"JetBrains Mono"'}}>AI가 차원이동 시 자동 반영됩니다</span>
              }
            </div>
          </div>
          );
        })()}

        {/* ── 설정 탭 ─────────────────────── */}
        {activeTab==='settings' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>

            {/* ── BGM ── */}
            <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,borderBottom:`1px solid ${V.aura}20`,paddingBottom:3}}>♪ BGM</div>

            {/* 재생 컨트롤 */}
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button onClick={()=>setMp3Idx(i=>(i-1+BGM_TRACKS.length)%BGM_TRACKS.length)}
                style={{background:`${V.aura}18`,border:`1px solid ${V.aura}30`,borderRadius:8,padding:'5px 9px',fontSize:12,cursor:'pointer',color:V.aura}}>⏮</button>
              <button onClick={()=>{
                  if(!mp3Playing){
                    getCtx();
                    audioRef.current?.play().catch(()=>{});
                    setMp3Playing(true);
                  } else {
                    audioRef.current?.pause();
                    setMp3Playing(false);
                  }
                }}
                style={{background:mp3Playing?`linear-gradient(135deg,${V.aura},${V.aura2})`:`${V.aura}18`,border:`1px solid ${V.aura}40`,borderRadius:8,padding:'5px 12px',fontSize:13,cursor:'pointer',color:mp3Playing?'#fff':V.aura,fontWeight:900}}>
                {mp3Playing?'⏸':'▶'}
              </button>
              <button onClick={()=>setMp3Idx(i=>(i+1)%BGM_TRACKS.length)}
                style={{background:`${V.aura}18`,border:`1px solid ${V.aura}30`,borderRadius:8,padding:'5px 9px',fontSize:12,cursor:'pointer',color:V.aura}}>⏭</button>
              {/* 루프 */}
              <button onClick={()=>setMp3Loop(l=>l==='all'?'one':'all')}
                style={{background:`${V.aura}18`,border:`1px solid ${V.aura}30`,borderRadius:8,padding:'5px 9px',fontSize:11,cursor:'pointer',color:V.aura}}>
                {mp3Loop==='one'?'🔂':'🔁'}
              </button>
              {/* 셔플 */}
              <button onClick={()=>setMp3Shuffle(s=>!s)}
                style={{background:mp3Shuffle?`${V.aura}35`:`${V.aura}18`,border:`1px solid ${mp3Shuffle?V.aura:V.aura+'30'}`,borderRadius:8,padding:'5px 9px',fontSize:11,cursor:'pointer',color:V.aura}}>🔀</button>
            </div>

            {/* 플레이리스트 */}
            <div style={{maxHeight:110,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
              {BGM_TRACKS.map((t,i)=>(
                <div key={i} onClick={()=>{ setMp3Idx(i); setTimeout(()=>{ if(audioRef.current){ audioRef.current.load(); audioRef.current.play().catch(()=>{}); setMp3Playing(true); }},50); }}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px',borderRadius:6,cursor:'pointer',
                    background:mp3Idx===i?`${V.aura}25`:(dark?'#ffffff05':'#ffffff30'),
                    border:`1px solid ${mp3Idx===i?V.aura+'40':'transparent'}`,transition:'all .1s'}}>
                  <span style={{fontSize:9,color:mp3Idx===i?V.aura:C.txt,opacity:mp3Idx===i?1:.55,fontWeight:mp3Idx===i?900:700}}>
                    {mp3Playing&&mp3Idx===i?'▶ ':''}{t.name}
                  </span>
                </div>
              ))}
            </div>

            {/* BGM 볼륨 */}
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:8,color:C.txt,fontWeight:800,minWidth:30}}>BGM</span>
              <input type='range' min={0} max={1} step={0.05} value={mp3Vol}
                onChange={e=>setMp3Vol(parseFloat(e.target.value))}
                style={{flex:1,accentColor:V.aura}}/>
              <span style={{fontSize:8,color:V.aura,fontFamily:'"JetBrains Mono"',minWidth:26}}>{Math.round(mp3Vol*100)}%</span>
            </div>

            {/* ── SFX ── */}
            <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,borderBottom:`1px solid ${V.aura}20`,paddingBottom:3,marginTop:2}}>SFX</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:8,color:C.txt,fontWeight:800,minWidth:30}}>SFX</span>
              <input type='range' min={0} max={1} step={0.05} value={sfxVol}
                onChange={e=>setSfxVol(parseFloat(e.target.value))}
                style={{flex:1,accentColor:V.aura}}/>
              <span style={{fontSize:8,color:V.aura,fontFamily:'"JetBrains Mono"',minWidth:26}}>{Math.round(sfxVol*100)}%</span>
            </div>

            {/* ── 기타 ── */}
            <div style={{fontSize:8,fontFamily:'"JetBrains Mono"',color:V.aura,letterSpacing:2,opacity:.7,borderBottom:`1px solid ${V.aura}20`,paddingBottom:3,marginTop:2}}>DISPLAY</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:11,fontWeight:900,color:C.txt}}>{dark?'🌙':'☀️'} 테마</span>
              <button onClick={()=>setDark(d=>!d)} style={{background:dark?`linear-gradient(135deg,${V.aura},${V.aura2})`:`${V.aura}20`,border:`1.5px solid ${V.aura}40`,borderRadius:20,padding:'4px 12px',fontSize:10,cursor:'pointer',color:dark?'#fff':V.aura,fontWeight:800}}>
                {dark?'DARK':'LIGHT'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
